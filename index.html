<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script>const whTooltips = {colorLinks: true, iconizeLinks: true, renameLinks: false, iconSize:"medium"};</script>
    <script src="https://wow.zamimg.com/js/tooltips.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <title>WoW Profile Viewer</title>
</head>
<body class="backgroundimg">

    <div class="card">
        <h1>WoW Fetch</h1>
        
        <div id="searchtools">
            <input type="text" id="name" placeholder="Character Name">
            <input type="text" id="realm" placeholder="Realm (e.g. Illidan)">
            <button id="search-button" onclick="loadFullProfile()" disabled>Search Character</button>
        </div>

        <nav id="profile-nav" style="display: none;">
            <button class="nav-btn active" onclick="showTab('overview')">Overview</button>
            <button class="nav-btn" onclick="showTab('mounts')">Mounts</button>
            <button class="nav-btn back-btn" onclick="location.reload()">New Search</button>
        </nav>

        <div id="character-info">
    <div id="overview-tab" class="tab-content" style="display: none;">
        <div class="main">
            <h2 id="char-name"></h2>
            <div class="stats-grid">
                <p><strong>Level:</strong> <span id="char-level"></span></p>
                <p><strong>Class:</strong> <span id="char-class"></span></p>
                <p><strong>Race:</strong> <span id="char-race"></span></p>
                <p><strong>Item Level:</strong> <span id="char-ilvl"></span></p>
                <p><strong>Achievement Points:</strong> <span id="achievement_points"></span></p>
                <p><strong>Total Mounts:</strong> <span class="total-mountsown">0</span></p>
            </div>
        </div>

        <div class="character-display-container">
            <div class="equipment-column" id="gear-left">
                <div class="gear-slot" id="slot-head"></div>
                <div class="gear-slot" id="slot-neck"></div>
                <div class="gear-slot" id="slot-shoulders"></div>
                <div class="gear-slot" id="slot-back"></div>
                <div class="gear-slot" id="slot-chest"></div>
                <div class="gear-slot" id="slot-shirt"></div>
                <div class="gear-slot" id="slot-tabard"></div>
                <div class="gear-slot" id="slot-wrist"></div>
            </div>

            <div class="imageframe">
                <img id="char-img" src="" class="characterimg">
                <div class="weapon-row">
                    <div id="slot-mainhand" class="gear-slot weapon-slot"></div>
                    <div id="slot-offhand" class="gear-slot weapon-slot"></div>
                </div>
            </div>

            <div class="equipment-column" id="gear-right">
                <div class="gear-slot" id="slot-hands"></div>
                <div class="gear-slot" id="slot-waist"></div>
                <div class="gear-slot" id="slot-legs"></div>
                <div class="gear-slot" id="slot-feet"></div>
                <div class="gear-slot" id="slot-finger1"></div>
                <div class="gear-slot" id="slot-finger2"></div>
                <div class="gear-slot" id="slot-trinket1"></div>
                <div class="gear-slot" id="slot-trinket2"></div>
            </div>
        </div>
    </div> <div id="mounts-tab" class="tab-content" style="display: none;">
        <div class="mountsec">
            <div class="mount-header">
                <h2 style="color: white;">Mounts Collection</h2>
                <h3 style="color: white;">Total Collected: <span class="total-mountsown">0</span> / <span class="game-total-mounts">0</span></h3>
                <input type="text" id="mountSearch" placeholder="Filter mounts..." onkeyup="filterMounts()">
            </div>
            <ul id="mount-grid-list" class="mount-grid"></ul>
        </div>
    </div> </div>

</div>
    <script src="script.js"></script>
</body>
</html>
